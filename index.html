<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>State Association Design Review 2026-2027</title>
<style>
  :root{
    --ink:#0f2d52;
    --paper:#ffffff;
    --card:#ffffff;
    --line:rgba(15,45,82,0.15);
    --accent:#e36f1e;
    --accent-soft:#fbbb76;
    --sky:#6dcef5;
    --sky-pale:#c0e7fa;
    --mono: 'AauxNext', 'Aaux Pro', 'Aaux', 'Helvetica Neue', Arial, sans-serif;
    --serif: 'AauxNext', 'Aaux Pro', 'Aaux', 'Helvetica Neue', Arial, sans-serif;
    --sans: 'AauxNext', 'Aaux Pro', 'Aaux', 'Helvetica Neue', Arial, sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--sans);
    -webkit-font-smoothing:antialiased;
  }

  /* ---------- Header ---------- */
  header{
    padding:64px 6vw 40px;
    border-bottom:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:24px;
  }
  .eyebrow{
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.16em;
    text-transform:uppercase;
    color:var(--accent);
    margin:0 0 10px;
  }
  h1{
    font-family:var(--serif);
    font-weight:600;
    font-size:clamp(36px,6vw,68px);
    line-height:0.98;
    margin:0;
    letter-spacing:-0.01em;
  }
  .meta{
    font-family:var(--mono);
    font-size:12.5px;
    color:rgba(15,45,82,0.65);
    text-align:right;
    line-height:1.7;
  }
  .meta span{color:var(--ink);font-weight:600;}

  /* ---------- Section labels ---------- */
  .section-head{
    margin:56px 6vw 20px;
    display:flex;
    align-items:baseline;
    gap:14px;
  }
  .section-head:first-of-type{margin-top:44px;}
  .section-num{
    font-family:var(--mono);
    font-size:13px;
    color:var(--accent);
    background:var(--accent-soft);
    padding:3px 8px;
    border-radius:3px;
  }
  .section-head h2{
    font-family:var(--serif);
    font-weight:600;
    font-size:22px;
    margin:0;
    text-transform:uppercase;
    letter-spacing:0.02em;
  }
  .section-count{
    font-family:var(--mono);
    font-size:12px;
    color:rgba(15,45,82,0.45);
    margin-left:auto;
  }

  /* ---------- Grid ---------- */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
    gap:22px;
    padding:0 6vw 20px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:8px;
    overflow:hidden;
    cursor:zoom-in;
    transition:transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    position:relative;
  }
  .card:hover{
    transform:translateY(-4px);
    box-shadow:0 14px 28px -12px rgba(15,45,82,0.30);
    border-color:rgba(227,111,30,0.5);
  }
  .card:focus-visible{
    outline:2px solid var(--accent);
    outline-offset:2px;
  }
  .card img{
    display:block;
    width:100%;
    aspect-ratio:16/9;
    object-fit:cover;
    background:var(--sky-pale);
  }
  .card .tag{
    position:absolute;
    top:10px;
    left:10px;
    font-family:var(--mono);
    font-size:11px;
    background:rgba(15,45,82,0.85);
    color:#ffffff;
    padding:3px 7px;
    border-radius:3px;
    letter-spacing:0.03em;
  }
  .card .foot{
    padding:10px 12px 12px;
    font-family:var(--mono);
    font-size:11.5px;
    color:rgba(15,45,82,0.65);
    display:flex;
    justify-content:space-between;
    gap:8px;
  }
  .card .foot .t{
    color:var(--ink);
    font-weight:600;
    text-transform:uppercase;
    letter-spacing:0.02em;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }

  footer{
    text-align:center;
    font-family:var(--mono);
    font-size:11px;
    color:rgba(15,45,82,0.4);
    padding:40px 0 60px;
    letter-spacing:0.04em;
  }

  /* ---------- Lightbox ---------- */
  .lightbox{
    position:fixed;
    inset:0;
    background:rgba(6,20,38,0.95);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:100;
    opacity:0;
    pointer-events:none;
    transition:opacity .22s ease;
    padding:24px;
  }
  .lightbox.open{
    opacity:1;
    pointer-events:auto;
  }
  .lightbox-inner{
    position:relative;
    display:flex;
    max-width:min(1180px,94vw);
    max-height:88vh;
    width:100%;
    transform:scale(0.97);
    transition:transform .22s ease;
    background:#ffffff;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 40px 90px -20px rgba(0,0,0,0.55);
  }
  .lightbox.open .lightbox-inner{transform:scale(1);}

  .lb-stage{
    flex:1 1 auto;
    min-width:0;
    display:flex;
    flex-direction:column;
    background:#0c1b30;
  }
  .lb-imgwrap{
    position:relative;
    flex:1;
    min-height:0;
    display:flex;
    align-items:center;
    justify-content:center;
    overflow:hidden;
    padding:26px;
  }
  .lb-imgwrap img{
    max-width:100%;
    max-height:100%;
    display:block;
    border-radius:3px;
    box-shadow:0 20px 50px -12px rgba(0,0,0,0.55);
    object-fit:contain;
  }
  .lb-caption{
    text-align:center;
    color:var(--sky-pale);
    font-family:var(--mono);
    font-size:12.5px;
    letter-spacing:0.03em;
    padding:0 20px 18px;
  }
  .lb-caption b{color:#fff;text-transform:uppercase;}

  .lb-close{
    position:absolute;
    top:14px;
    right:14px;
    color:var(--sky-pale);
    font-family:var(--mono);
    font-size:12px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    background:rgba(109,206,245,0.12);
    border:1px solid rgba(109,206,245,0.35);
    padding:8px 14px;
    border-radius:20px;
    cursor:pointer;
    z-index:5;
  }
  .lb-close:hover{background:rgba(109,206,245,0.22);}
  .lb-nav{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    background:rgba(109,206,245,0.14);
    border:1px solid rgba(109,206,245,0.35);
    color:#fff;
    width:42px;
    height:42px;
    border-radius:50%;
    font-size:19px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:4;
  }
  .lb-nav:hover{background:rgba(109,206,245,0.26);}
  .lb-prev{left:14px;}
  .lb-next{right:14px;}

  /* ---------- Feedback panel ---------- */
  .fb-panel{
    flex:0 0 328px;
    width:328px;
    max-height:88vh;
    background:#ffffff;
    display:flex;
    flex-direction:column;
    border-left:1px solid var(--line);
  }
  .fb-header{
    padding:20px 20px 14px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .fb-eyebrow{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--accent);
    font-weight:600;
  }
  .fb-tally{
    display:flex;
    gap:6px;
    font-family:var(--mono);
    font-size:11.5px;
  }
  .fb-tally .tally{
    padding:3px 8px;
    border-radius:12px;
    font-weight:600;
  }
  .fb-tally .tally.approve{background:rgba(109,206,245,0.25);color:var(--ink);}
  .fb-tally .tally.decline{background:rgba(227,111,30,0.16);color:var(--accent);}

  .fb-vote-row{
    display:flex;
    gap:8px;
    padding:16px 20px 0;
  }
  .vote-btn{
    flex:1;
    padding:10px 8px;
    border-radius:8px;
    border:1.5px solid var(--line);
    background:#fff;
    font-family:var(--sans);
    font-size:13px;
    font-weight:600;
    letter-spacing:0.01em;
    cursor:pointer;
    color:var(--ink);
    transition:all .15s ease;
  }
  .vote-btn.approve:hover{border-color:var(--sky);}
  .vote-btn.decline:hover{border-color:var(--accent);}
  .vote-btn.approve.selected{
    background:var(--sky);
    border-color:var(--sky);
    color:var(--ink);
  }
  .vote-btn.decline.selected{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }

  .fb-form{
    padding:14px 20px 16px;
    display:flex;
    flex-direction:column;
    gap:8px;
    border-bottom:1px solid var(--line);
  }
  .fb-form input,
  .fb-form textarea{
    font-family:var(--sans);
    font-size:13px;
    color:var(--ink);
    border:1.5px solid var(--line);
    border-radius:7px;
    padding:9px 11px;
    resize:vertical;
    outline:none;
    background:#fbfdff;
  }
  .fb-form input:focus,
  .fb-form textarea:focus{border-color:var(--sky);}
  .fb-form textarea{min-height:64px;font-family:inherit;}
  .fb-submit{
    align-self:flex-end;
    background:var(--ink);
    color:#fff;
    border:none;
    font-family:var(--sans);
    font-size:12.5px;
    font-weight:600;
    letter-spacing:0.02em;
    padding:9px 16px;
    border-radius:20px;
    cursor:pointer;
    transition:background .15s ease;
  }
  .fb-submit:hover{background:var(--accent);}

  .fb-list{
    flex:1;
    overflow-y:auto;
    padding:6px 20px 20px;
  }
  .fb-empty{
    font-family:var(--mono);
    font-size:12px;
    color:rgba(15,45,82,0.4);
    padding:18px 0;
    text-align:center;
  }
  .fb-entry{
    padding:12px 0;
    border-bottom:1px solid var(--line);
  }
  .fb-entry:last-child{border-bottom:none;}
  .fb-entry-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
    margin-bottom:5px;
  }
  .fb-entry-name{
    font-weight:700;
    font-size:12.5px;
    color:var(--ink);
  }
  .fb-entry-badge{
    font-family:var(--mono);
    font-size:10.5px;
    font-weight:700;
    letter-spacing:0.03em;
    text-transform:uppercase;
    padding:2px 7px;
    border-radius:10px;
  }
  .fb-entry-badge.approve{background:rgba(109,206,245,0.3);color:var(--ink);}
  .fb-entry-badge.decline{background:rgba(227,111,30,0.16);color:var(--accent);}
  .fb-entry-text{
    font-size:13px;
    line-height:1.45;
    color:rgba(15,45,82,0.85);
    white-space:pre-wrap;
    word-break:break-word;
  }
  .fb-entry-foot{
    display:flex;
    justify-content:space-between;
    margin-top:5px;
  }
  .fb-entry-time{
    font-family:var(--mono);
    font-size:10.5px;
    color:rgba(15,45,82,0.4);
  }
  .fb-entry-del{
    font-family:var(--mono);
    font-size:10.5px;
    color:rgba(15,45,82,0.4);
    background:none;
    border:none;
    cursor:pointer;
    text-decoration:underline;
  }
  .fb-entry-del:hover{color:var(--accent);}

  /* ---------- Grid card feedback badge ---------- */
  .fb-badge{
    position:absolute;
    top:10px;
    right:10px;
    display:flex;
    gap:4px;
  }
  .fb-badge span{
    font-family:var(--mono);
    font-size:10.5px;
    font-weight:700;
    padding:2px 6px;
    border-radius:10px;
    letter-spacing:0.02em;
  }
  .fb-badge .b-approve{background:rgba(109,206,245,0.85);color:var(--ink);}
  .fb-badge .b-decline{background:rgba(227,111,30,0.9);color:#fff;}

  /* ---------- Header toolbar ---------- */
  .toolbar{
    display:flex;
    gap:14px;
    justify-content:flex-end;
    margin-top:10px;
  }
  .tool-btn{
    font-family:var(--mono);
    font-size:11px;
    letter-spacing:0.04em;
    text-transform:uppercase;
    color:var(--ink);
    background:none;
    border:1px solid var(--line);
    padding:6px 12px;
    border-radius:16px;
    cursor:pointer;
  }
  .tool-btn:hover{border-color:var(--accent);color:var(--accent);}

  @media (max-width:900px){
    .lightbox{padding:0;}
    .lightbox-inner{
      flex-direction:column;
      max-width:100vw;
      max-height:100vh;
      border-radius:0;
      overflow-y:auto;
    }
    .lb-stage{min-height:46vh;}
    .fb-panel{
      flex:none;
      width:100%;
      max-height:none;
      border-left:none;
      border-top:1px solid var(--line);
    }
  }

  @media (prefers-reduced-motion: reduce){
    .card, .lightbox, .lightbox-inner{transition:none;}
  }
</style>
</head>
<body>

<header>
  <div>
    <p class="eyebrow">Click any slide to zoom &mdash; click off or press Esc to return</p>
    <h1>State Association<br>Design Review 2026-2027</h1>
  </div>
  <div class="meta">
    <span id="slide-count">—</span> slides<br>
    Grouped by section
    <div class="toolbar">
      <button class="tool-btn" id="export-btn" type="button">Export feedback (.csv)</button>
      <button class="tool-btn" id="clear-btn" type="button">Clear feedback</button>
    </div>
  </div>
</header>

<main id="sections"></main>

<footer>Full deck browser &middot; generated from UIL_2026_Design_Review.pptx</footer>

<div class="lightbox" id="lightbox">
  <div class="lightbox-inner">
    <div class="lb-stage">
      <div class="lb-imgwrap">
        <button class="lb-nav lb-prev" id="lb-prev" aria-label="Previous slide">&#8249;</button>
        <img id="lb-img" src="" alt="">
        <button class="lb-nav lb-next" id="lb-next" aria-label="Next slide">&#8250;</button>
      </div>
      <div class="lb-caption"><b id="lb-title"></b> &nbsp;&middot;&nbsp; Slide <span id="lb-num"></span></div>
    </div>
    <aside class="fb-panel">
      <div class="fb-header">
        <span class="fb-eyebrow">Feedback</span>
        <div class="fb-tally">
          <span class="tally approve" id="tally-approve">&#10003; 0</span>
          <span class="tally decline" id="tally-decline">&#10007; 0</span>
        </div>
      </div>
      <div class="fb-vote-row">
        <button class="vote-btn approve" id="vote-approve" type="button">&#10003; Approve</button>
        <button class="vote-btn decline" id="vote-decline" type="button">&#10007; Decline</button>
      </div>
      <div class="fb-form">
        <input type="text" id="fb-name" placeholder="Your name (optional)">
        <textarea id="fb-comment" placeholder="Add a comment on this slide…"></textarea>
        <button class="fb-submit" id="fb-submit" type="button">Post feedback</button>
      </div>
      <div class="fb-list" id="fb-list"></div>
    </aside>
    <button class="lb-close" id="lb-close">Close &#10005;</button>
  </div>
</div>

<script src="slides.data.js"></script>
<script>
(function(){
  var sectionsEl = document.getElementById('sections');
  var countEl = document.getElementById('slide-count');
  countEl.textContent = SLIDES.length;

  // ============================================================
  // Google Sheet sync — paste your deployed Apps Script Web App
  // URL below to turn on shared, real-time feedback for everyone
  // who opens this page. Leave blank to fall back to private,
  // browser-only storage. See setup instructions provided
  // alongside this file.
  // ============================================================
  var SHEET_API_URL = 'https://script.google.com/macros/s/AKfycbwJ1fpzTI5CWx2PCo2kVa553qgQxqUALrKO9dUPP0eunqgitBIyLK_hJnzd3RKe3xF0Lw/exec'; // e.g. 'https://script.google.com/macros/s/XXXXXXXX/exec'
  var SHEET_VIEW_URL = 'https://docs.google.com/spreadsheets/d/1iyo_ptrSEH7DlWU1LvLTXqj3KyhravLmwqpjTPwGN2s/edit';
  var SHEET_MODE = !!SHEET_API_URL;
  var POLL_MS = 20000;

  // ---------- Local (per-browser) storage ----------
  var FEEDBACK_KEY = 'sadr-feedback-v1';
  var NAME_KEY = 'sadr-reviewer-name';

  function loadLocalFeedback(){
    try{ return JSON.parse(localStorage.getItem(FEEDBACK_KEY) || '{}'); }
    catch(e){ return {}; }
  }
  function saveLocalFeedback(data){
    try{ localStorage.setItem(FEEDBACK_KEY, JSON.stringify(data)); }
    catch(e){ console.error('Could not save feedback', e); }
  }
  function addLocalFeedback(num, entry){
    var all = loadLocalFeedback();
    var key = String(num);
    if(!all[key]) all[key] = [];
    all[key].push(entry);
    saveLocalFeedback(all);
  }
  function deleteLocalFeedback(num, idx){
    var all = loadLocalFeedback();
    var key = String(num);
    if(all[key]){ all[key].splice(idx,1); saveLocalFeedback(all); }
  }

  // ---------- Shared (Google Sheet) cache ----------
  var sheetCache = {};      // { "3": [ {name,vote,comment,ts}, ... ] }
  var sheetLoaded = false;
  var sheetLastError = null;
  var jsonpCounter = 0;

  // JSONP request: loads the Apps Script URL as a <script> tag instead of
  // via fetch(). Script tags aren't subject to CORS, which sidesteps
  // Google Apps Script's inconsistent CORS support entirely.
  function jsonpRequest(params){
    return new Promise(function(resolve, reject){
      var cbName = 'sadrCb' + (jsonpCounter++) + '_' + Date.now();
      var script = document.createElement('script');

      var timeoutId = setTimeout(function(){
        cleanup();
        reject(new Error('Request to Google Sheet timed out. Check your internet connection and that the Apps Script URL is deployed with access set to "Anyone".'));
      }, 15000);

      function cleanup(){
        clearTimeout(timeoutId);
        delete window[cbName];
        if(script.parentNode) script.parentNode.removeChild(script);
      }

      window[cbName] = function(data){
        cleanup();
        resolve(data);
      };

      script.onerror = function(){
        cleanup();
        reject(new Error('Could not reach the Google Sheet script. Double-check the deployed URL is correct and still active.'));
      };

      var qs = Object.keys(params).map(function(k){
        return encodeURIComponent(k) + '=' + encodeURIComponent(params[k] == null ? '' : params[k]);
      }).join('&');

      script.src = SHEET_API_URL + '?' + qs + '&callback=' + cbName;
      document.head.appendChild(script);
    });
  }

  function fetchSheetFeedback(){
    if(!SHEET_MODE) return Promise.resolve(null);
    return jsonpRequest({ action: 'list' })
      .then(function(json){
        var grouped = {};
        (json.data || []).forEach(function(row){
          var key = String(row.slide);
          if(!grouped[key]) grouped[key] = [];
          grouped[key].push({
            name: row.name,
            vote: row.vote || null,
            comment: row.comment,
            ts: row.ts ? new Date(row.ts).getTime() : Date.now()
          });
        });
        sheetCache = grouped;
        sheetLoaded = true;
        sheetLastError = null;
        return grouped;
      })
      .catch(function(err){
        sheetLastError = err.message || String(err);
        console.error('Sheet fetch failed:', sheetLastError);
        return null;
      });
  }

  function postSheetFeedback(num, title, entry){
    return jsonpRequest({
      action: 'add',
      slide: num,
      title: title,
      name: entry.name,
      vote: entry.vote || '',
      comment: entry.comment
    });
  }

  // ---------- Unified accessors ----------
  function getFeedback(num){
    if(SHEET_MODE) return sheetCache[String(num)] || [];
    return loadLocalFeedback()[String(num)] || [];
  }
  function tallyFor(num){
    var list = getFeedback(num);
    var t = {approve:0, decline:0};
    list.forEach(function(e){
      if(e.vote === 'approve') t.approve++;
      if(e.vote === 'decline') t.decline++;
    });
    return t;
  }
  function timeAgo(ts){
    var diff = Math.max(0, Date.now() - ts);
    var mins = Math.round(diff/60000);
    if(mins < 1) return 'just now';
    if(mins < 60) return mins + 'm ago';
    var hrs = Math.round(mins/60);
    if(hrs < 24) return hrs + 'h ago';
    var days = Math.round(hrs/24);
    return days + 'd ago';
  }

  function updateCardBadge(num){
    var el = document.getElementById('fb-badge-' + num);
    if(!el) return;
    var t = tallyFor(num);
    var html = '';
    if(t.approve) html += '<span class="b-approve">&#10003; ' + t.approve + '</span>';
    if(t.decline) html += '<span class="b-decline">&#10007; ' + t.decline + '</span>';
    el.innerHTML = html;
  }
  function updateAllBadges(){
    SLIDES.forEach(function(s){ updateCardBadge(s.num); });
  }

  // group contiguous slides sharing the same title into sections
  var groups = [];
  SLIDES.forEach(function(s){
    var last = groups[groups.length-1];
    if(last && last.title === s.title){
      last.items.push(s);
    } else {
      groups.push({title:s.title, items:[s]});
    }
  });

  // rename specific section headers (1-indexed) per request
  var sectionRenames = {
    1: 'UIL Athletics',
    4: 'UIL Academics & Music',
    7: 'MHSAA',
    13: 'AIA'
  };
  groups.forEach(function(g, gi){
    if(sectionRenames[gi + 1]){
      g.title = sectionRenames[gi + 1];
    }
  });

  groups.forEach(function(g, gi){
    var head = document.createElement('div');
    head.className = 'section-head';
    head.innerHTML =
      '<span class="section-num">' + String(gi+1).padStart(2,'0') + '</span>' +
      '<h2>' + g.title + '</h2>' +
      '<span class="section-count">' + g.items.length + (g.items.length===1?' slide':' slides') + '</span>';
    sectionsEl.appendChild(head);

    var grid = document.createElement('div');
    grid.className = 'grid';
    g.items.forEach(function(s){
      var card = document.createElement('div');
      card.className = 'card';
      card.tabIndex = 0;
      card.setAttribute('role','button');
      card.setAttribute('aria-label','Open slide ' + s.num + ': ' + s.title);
      card.innerHTML =
        '<span class="tag">#' + s.num + '</span>' +
        '<span class="fb-badge" id="fb-badge-' + s.num + '"></span>' +
        '<img src="' + s.data + '" alt="Slide ' + s.num + ': ' + s.title + '" loading="lazy">' +
        '<div class="foot"><span class="t">' + s.title + '</span><span>' + s.num + ' / ' + SLIDES.length + '</span></div>';
      card.addEventListener('click', function(){ openLightbox(s.num - 1); });
      card.addEventListener('keydown', function(e){
        if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); openLightbox(s.num - 1); }
      });
      grid.appendChild(card);
      updateCardBadge(s.num);
    });
    sectionsEl.appendChild(grid);
  });

  // ---------- Lightbox ----------
  var lightbox = document.getElementById('lightbox');
  var lbImg = document.getElementById('lb-img');
  var lbTitle = document.getElementById('lb-title');
  var lbNum = document.getElementById('lb-num');
  var current = 0;
  var lastFocused = null;
  var selectedVote = null;
  var pollTimer = null;

  var fbNameInput = document.getElementById('fb-name');
  var fbCommentInput = document.getElementById('fb-comment');
  var fbList = document.getElementById('fb-list');
  var voteApproveBtn = document.getElementById('vote-approve');
  var voteDeclineBtn = document.getElementById('vote-decline');
  var tallyApproveEl = document.getElementById('tally-approve');
  var tallyDeclineEl = document.getElementById('tally-decline');
  var fbSubmitBtn = document.getElementById('fb-submit');

  fbNameInput.value = localStorage.getItem(NAME_KEY) || '';
  fbNameInput.addEventListener('input', function(){
    try{ localStorage.setItem(NAME_KEY, fbNameInput.value); }catch(e){}
  });

  function setSelectedVote(v){
    selectedVote = (selectedVote === v) ? null : v;
    voteApproveBtn.classList.toggle('selected', selectedVote === 'approve');
    voteDeclineBtn.classList.toggle('selected', selectedVote === 'decline');
  }
  voteApproveBtn.addEventListener('click', function(){ setSelectedVote('approve'); });
  voteDeclineBtn.addEventListener('click', function(){ setSelectedVote('decline'); });

  function renderFeedbackPanel(num){
    var list = getFeedback(num);
    var t = tallyFor(num);
    tallyApproveEl.textContent = '\u2713 ' + t.approve;
    tallyDeclineEl.textContent = '\u2717 ' + t.decline;

    selectedVote = null;
    voteApproveBtn.classList.remove('selected');
    voteDeclineBtn.classList.remove('selected');
    fbCommentInput.value = '';

    if(!list.length){
      var emptyMsg;
      if(SHEET_MODE && sheetLastError){
        emptyMsg = 'Could not load shared feedback: ' + sheetLastError;
      } else if(SHEET_MODE && !sheetLoaded){
        emptyMsg = 'Loading feedback…';
      } else {
        emptyMsg = 'No feedback yet — be the first to weigh in.';
      }
      fbList.innerHTML = '<div class="fb-empty">' + emptyMsg + '</div>';
      return;
    }
    var html = '';
    list.slice().reverse().forEach(function(entry, idx){
      var realIdx = list.length - 1 - idx;
      var badge = '';
      if(entry.vote === 'approve') badge = '<span class="fb-entry-badge approve">Approved</span>';
      if(entry.vote === 'decline') badge = '<span class="fb-entry-badge decline">Declined</span>';
      var delBtn = SHEET_MODE ? '' :
        '<button class="fb-entry-del" data-idx="' + realIdx + '">Remove</button>';
      html +=
        '<div class="fb-entry">' +
          '<div class="fb-entry-head">' +
            '<span class="fb-entry-name">' + escapeHtml(entry.name || 'Anonymous') + '</span>' +
            badge +
          '</div>' +
          (entry.comment ? '<div class="fb-entry-text">' + escapeHtml(entry.comment) + '</div>' : '') +
          '<div class="fb-entry-foot">' +
            '<span class="fb-entry-time">' + timeAgo(entry.ts) + '</span>' +
            delBtn +
          '</div>' +
        '</div>';
    });
    fbList.innerHTML = html;
  }

  function escapeHtml(str){
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;');
  }

  fbList.addEventListener('click', function(e){
    if(e.target.classList.contains('fb-entry-del')){
      var idx = parseInt(e.target.getAttribute('data-idx'), 10);
      var num = SLIDES[current].num;
      deleteLocalFeedback(num, idx);
      renderFeedbackPanel(num);
      updateCardBadge(num);
    }
  });

  fbSubmitBtn.addEventListener('click', function(){
    var comment = fbCommentInput.value.trim();
    if(!comment && !selectedVote){
      fbCommentInput.focus();
      return;
    }
    var num = SLIDES[current].num;
    var title = SLIDES[current].title;
    var entry = {
      name: fbNameInput.value.trim(),
      vote: selectedVote,
      comment: comment,
      ts: Date.now()
    };

    if(SHEET_MODE){
      fbSubmitBtn.disabled = true;
      fbSubmitBtn.textContent = 'Posting…';
      postSheetFeedback(num, title, entry)
        .then(function(){ return fetchSheetFeedback(); })
        .then(function(){
          renderFeedbackPanel(num);
          updateCardBadge(num);
        })
        .catch(function(err){
          console.error(err);
          alert('Could not reach the Google Sheet:\n\n' + (err.message || err) + '\n\nOpen the browser console (F12) for more detail.');
        })
        .finally(function(){
          fbSubmitBtn.disabled = false;
          fbSubmitBtn.textContent = 'Post feedback';
        });
    } else {
      addLocalFeedback(num, entry);
      renderFeedbackPanel(num);
      updateCardBadge(num);
    }
  });

  function render(){
    var s = SLIDES[current];
    lbImg.src = s.data;
    lbImg.alt = 'Slide ' + s.num + ': ' + s.title;
    lbTitle.textContent = s.title;
    lbNum.textContent = s.num + ' / ' + SLIDES.length;
    renderFeedbackPanel(s.num);
  }

  function openLightbox(i){
    current = i;
    lastFocused = document.activeElement;
    render();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
    document.getElementById('lb-close').focus();

    if(SHEET_MODE){
      fetchSheetFeedback().then(function(){
        if(lightbox.classList.contains('open')) renderFeedbackPanel(SLIDES[current].num);
        updateAllBadges();
      });
      clearInterval(pollTimer);
      pollTimer = setInterval(function(){
        fetchSheetFeedback().then(function(){
          if(lightbox.classList.contains('open')) renderFeedbackPanel(SLIDES[current].num);
          updateAllBadges();
        });
      }, POLL_MS);
    }
  }

  function closeLightbox(){
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
    if(lastFocused) lastFocused.focus();
    clearInterval(pollTimer);
  }

  function next(){ current = (current + 1) % SLIDES.length; render(); }
  function prev(){ current = (current - 1 + SLIDES.length) % SLIDES.length; render(); }

  // click off (on the dark backdrop, not the image or panel) closes
  lightbox.addEventListener('click', function(e){
    if(e.target === lightbox){ closeLightbox(); }
  });
  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-next').addEventListener('click', function(e){ e.stopPropagation(); next(); });
  document.getElementById('lb-prev').addEventListener('click', function(e){ e.stopPropagation(); prev(); });

  document.addEventListener('keydown', function(e){
    if(!lightbox.classList.contains('open')) return;
    if(document.activeElement === fbCommentInput || document.activeElement === fbNameInput){
      if(e.key === 'Escape'){ closeLightbox(); }
      return;
    }
    if(e.key === 'Escape') closeLightbox();
    if(e.key === 'ArrowRight') next();
    if(e.key === 'ArrowLeft') prev();
  });

  // ---------- Header toolbar ----------
  var exportBtn = document.getElementById('export-btn');
  var clearBtn = document.getElementById('clear-btn');

  if(SHEET_MODE){
    exportBtn.textContent = 'Open Google Sheet ↗';
    exportBtn.addEventListener('click', function(){
      window.open(SHEET_VIEW_URL, '_blank');
    });
    clearBtn.textContent = 'Refresh feedback';
    clearBtn.addEventListener('click', function(){
      clearBtn.textContent = 'Refreshing…';
      fetchSheetFeedback().then(function(){
        updateAllBadges();
        if(lightbox.classList.contains('open')) renderFeedbackPanel(SLIDES[current].num);
        clearBtn.textContent = 'Refresh feedback';
      });
    });
    // initial load so grid badges are populated without opening a slide
    fetchSheetFeedback().then(updateAllBadges);
  } else {
    exportBtn.addEventListener('click', function(){
      var all = loadLocalFeedback();
      var rows = [['Slide #','Slide Title','Name','Vote','Comment','Timestamp']];
      SLIDES.forEach(function(s){
        var list = all[String(s.num)] || [];
        list.forEach(function(e){
          rows.push([
            s.num,
            s.title,
            e.name || 'Anonymous',
            e.vote || '',
            (e.comment || '').replace(/\n/g,' '),
            new Date(e.ts).toISOString()
          ]);
        });
      });
      if(rows.length === 1){
        alert('No feedback has been recorded yet in this browser.');
        return;
      }
      var csv = rows.map(function(r){
        return r.map(function(v){
          var s = String(v).replace(/"/g,'""');
          return /[",\n]/.test(s) ? '"' + s + '"' : s;
        }).join(',');
      }).join('\n');
      var blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
      var url = URL.createObjectURL(blob);
      var a = document.createElement('a');
      a.href = url;
      a.download = 'design-review-feedback.csv';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    });

    clearBtn.addEventListener('click', function(){
      if(confirm('Clear all feedback saved in this browser? This cannot be undone. Export a CSV first if you want to keep a copy.')){
        localStorage.removeItem(FEEDBACK_KEY);
        updateAllBadges();
        if(lightbox.classList.contains('open')) renderFeedbackPanel(SLIDES[current].num);
      }
    });
  }
})();
</script>

</body>
</html>
